<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinemax Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:white;
overflow:hidden;
padding:20px;
}

/* animated gradient */

body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(130deg,#020617,#0f172a,#1e293b,#020617);
background-size:400% 400%;
animation:bgmove 18s ease infinite;
z-index:-2;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating particles */

body::after{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 80% 60%,white,transparent),
radial-gradient(2px 2px at 50% 80%,white,transparent),
radial-gradient(2px 2px at 10% 70%,white,transparent);
opacity:0.15;
animation:particles 60s linear infinite;
z-index:-1;
}

@keyframes particles{
0%{transform:translateY(0)}
100%{transform:translateY(-400px)}
}

/* main card */

.card{

width:100%;
max-width:640px;
text-align:center;

padding:50px 35px;

background:rgba(255,255,255,0.05);
border-radius:22px;

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(16px);

box-shadow:0 20px 80px rgba(0,0,0,0.8);

animation:fade 1s ease;

}

/* icon */

.icon{
font-size:60px;
margin-bottom:10px;
animation:spin 8s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* title */

h1{
font-size:32px;
margin-bottom:10px;
}

/* subtitle */

p{
font-size:16px;
opacity:0.8;
line-height:1.6;
margin-bottom:30px;
}

/* progress bar */

.progress{

width:100%;
height:10px;

background:rgba(255,255,255,0.1);

border-radius:10px;

overflow:hidden;

margin-bottom:35px;

}

.progress span{

display:block;
height:100%;
width:0%;

background:linear-gradient(90deg,#22c55e,#4ade80);

animation:load 6s linear infinite;

}

@keyframes load{
0%{width:0}
100%{width:100%}
}

/* countdown */

.countdown{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;

margin-bottom:30px;

}

.time{

background:rgba(255,255,255,0.06);

padding:12px 16px;

border-radius:12px;

min-width:65px;

}

.time h2{
font-size:20px;
}

.time span{
font-size:12px;
opacity:0.7;
}

/* button */

.btn{

display:inline-block;

padding:12px 24px;

border-radius:10px;

background:#22c55e;

color:white;

text-decoration:none;

font-weight:500;

transition:0.3s;

}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 0 18px #22c55e;
}

/* footer */

footer{
margin-top:30px;
font-size:13px;
opacity:0.6;
}

/* fade */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* mobile */

@media(max-width:480px){

h1{
font-size:24px;
}

p{
font-size:14px;
}

.icon{
font-size:50px;
}

.time{
min-width:55px;
}

.time h2{
font-size:17px;
}

}

</style>
</head>

<body>

<div class="card">

<div class="icon">🎬</div>

<h1>Cinemax is Updating</h1>

<p>
Our website is currently under maintenance.<br>
We are upgrading the system to deliver a better movie experience.
</p>

<div class="progress">
<span></span>
</div>

<div class="countdown">

<div class="time">
<h2 id="h">00</h2>
<span>Hours</span>
</div>

<div class="time">
<h2 id="m">00</h2>
<span>Minutes</span>
</div>

<div class="time">
<h2 id="s">00</h2>
<span>Seconds</span>
</div>

</div>

<a href="" class="btn">Refresh Page</a>

<footer>
© 2026 Cinemax Movie
</footer>

</div>

<script>

let time = 3 * 60 * 60;

function update(){

let h = Math.floor(time/3600);
let m = Math.floor((time%3600)/60);
let s = time%60;

document.getElementById("h").innerText = String(h).padStart(2,"0");
document.getElementById("m").innerText = String(m).padStart(2,"0");
document.getElementById("s").innerText = String(s).padStart(2,"0");

if(time>0) time--;

}

setInterval(update,1000);

</script>

</body>
</html>
