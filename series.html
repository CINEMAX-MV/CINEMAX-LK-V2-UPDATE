<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>TV Series</title>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(to bottom,#0a0a0a,#111);
color:#fff;
}

/* Glass Container */
.container{
width:1000px;
margin:40px auto;
background:rgba(20,20,20,0.7);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,60,0,0.15);
}

/* ===== TITLE ===== */

#seriesTitle{
font-size:38px;
font-weight:700;
color:#ff7b00;
margin-bottom:10px;
text-shadow:0 0 15px rgba(255,123,0,0.4);
}

.orange-line{
height:4px;
width:200px;
background:linear-gradient(to right,#ff3c00,#ff7b00);
border-radius:50px;
margin-bottom:35px;
}

/* ===== TRAILER ===== */

.trailer iframe{
width:100%;
height:500px;
border-radius:18px;
border:2px solid #222;
box-shadow:0 0 35px rgba(255,60,0,0.4);
}

/* ===== SOCIAL ===== */

.social-icons{
margin:25px 0;
}

.social-icons a{
display:inline-block;
margin-right:18px;
font-size:26px;
text-decoration:none;
transition:0.3s;
}

.social-icons a:hover{
transform:scale(1.3);
filter:brightness(1.5);
}

/* ===== EPISODES ===== */

.episode-list{
margin-top:45px;
}

.episode-item{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(145deg,#141414,#1c1c1c);
padding:20px 25px;
margin-bottom:18px;
border-radius:16px;
text-decoration:none;
color:#fff;
border:1px solid #222;
transition:all 0.35s ease;
position:relative;
overflow:hidden;
}

.episode-item::before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:6px;
background:#ff3c00;
transition:0.3s;
}

.episode-item:hover{
transform:translateX(10px) scale(1.03);
box-shadow:0 15px 40px rgba(255,60,0,0.45);
border:1px solid #ff3c00;
}

.episode-item:hover::before{
width:10px;
}

.ep-left{
display:flex;
flex-direction:column;
}

.ep-title{
font-size:18px;
font-weight:600;
}

.ep-meta{
font-size:13px;
color:#aaa;
margin-top:5px;
}

.ep-right{
display:flex;
align-items:center;
gap:10px;
}

.badge{
background:#000;
padding:5px 12px;
border-radius:20px;
font-size:12px;
border:1px solid #333;
}

.watch-btn{
background:#000;
padding:7px 18px;
border-radius:30px;
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
border:1px solid #333;
transition:0.3s;
}

.episode-item:hover .watch-btn{
background:#fff;
color:#000;
font-weight:bold;
}

/* ===== ANNOUNCEMENT ===== */

.announcement{
margin-top:70px;
background:linear-gradient(145deg,#111,#1a1a1a);
padding:30px;
border-left:6px solid red;
border-radius:15px;
color:#ffcc00;
line-height:1.8;
box-shadow:0 0 25px rgba(255,0,0,0.2);
}

.announcement h3{
color:#ff3c00;
margin-top:0;
}

/* ===== RESPONSIVE ===== */

@media(max-width:768px){
.container{width:95%;}
.trailer iframe{height:250px;}
}

</style>
</head>

<body>

<div class="container">

<h1 id="seriesTitle"></h1>
<div class="orange-line"></div>

<div class="trailer">
<iframe id="trailerFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<div class="social-icons">
<a href="#" style="color:#3b5998;">📘</a>
<a href="#" style="color:#25D366;">🟢</a>
<a href="#" style="color:#1DA1F2;">🐦</a>
<a href="#" style="color:#ff00ff;">🔗</a>

<div id="episodeContainer"></div>

<div class="announcement">

Limit exceed වුනොත් ටික වෙලාවක් පස්සේ try කරන්න.
</div>

</div>

<script>

}

</script>

</body>
</html>
