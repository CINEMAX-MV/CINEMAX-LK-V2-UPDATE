<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>TV Series</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0d0d0d;
color:#fff;
}

.container{
width:1000px;
margin:30px auto;
}

/* Title */
#seriesTitle{
font-size:32px;
color:#ff7b00;
margin-bottom:5px;
font-weight:bold;
}

.orange-line{
height:3px;
width:150px;
background:#ff3c00;
border-radius:10px;
margin-bottom:25px;
}

/* Trailer */
.trailer iframe{
width:100%;
height:450px;
border-radius:15px;
border:2px solid #222;
box-shadow:0 0 25px rgba(255,60,0,0.3);
}

/* Social */
.social-icons{
margin:20px 0;
}

.social-icons a{
display:inline-block;
margin-right:15px;
font-size:24px;
text-decoration:none;
transition:0.3s;
}

.social-icons a:hover{
transform:scale(1.2);
}

/* Episodes */
.episode-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:25px;
}

.episode-box{
background:#111;
padding:14px;
text-align:center;
border-radius:10px;
text-decoration:none;
color:#fff;
font-weight:bold;
border:1px solid #222;
transition:0.3s;
}

.episode-box:hover{
background:#ff3c00;
transform:translateY(-5px);
box-shadow:0 5px 20px rgba(255,60,0,0.4);
}

/* Announcement */
.announcement{
margin-top:50px;
background:#111;
padding:20px;
border-left:5px solid red;
border-radius:10px;
color:#ffcc00;
line-height:1.7;
}

.announcement h3{
color:red;
margin-top:0;
}

/* Responsive */
@media(max-width:768px){
.container{width:95%;}
.trailer iframe{height:250px;}
.episode-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<div class="container">

<h1 id="seriesTitle"></h1>
<div class="orange-line"></div>

<!-- Trailer -->
<div class="trailer">
<iframe id="trailerFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<!-- Social -->
<div class="social-icons">
<a href="#" style="color:#3b5998;">📘</a>
<a href="#" style="color:#25D366;">🟢</a>
<a href="#" style="color:#1DA1F2;">🐦</a>
<a href="#" style="color:#ff00ff;">🔗</a>
