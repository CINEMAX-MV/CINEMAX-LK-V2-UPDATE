<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>TV Series</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0;padding:15px}

.trailer iframe{
width:100%;
height:250px;
border-radius:10px;
}

.social-icons{
margin:15px 0;
}

.social-icons a{
display:inline-block;
margin-right:12px;
font-size:22px;
text-decoration:none;
}

.episode-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.episode-box{
background:#ff3c00;
padding:12px;
text-align:center;
border-radius:8px;
text-decoration:none;
color:#fff;
font-weight:bold;
}

.episode-box:hover{
background:#ff5722;
}

.blue-line{
height:3px;
background:#ff3c00;
margin:10px 0 20px;
}
</style>
</head>

<body>

<div class="trailer">

const params = new URLSearchParams(window.location.search);
const show = params.get("show")?.toLowerCase();

if(seriesData[show]){

const title = seriesData[show].title;
document.getElementById("seriesTitle").innerText = title;

// 🔥 AUTO YOUTUBE TRAILER FETCH
fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${title} official trailer&type=video&maxResults=1&key=${API_KEY}`)
.then(res=>res.json())
.then(data=>{
if(data.items && data.items.length>0){
const videoId = data.items[0].id.videoId;
document.getElementById("trailerFrame").src =
`https://www.youtube.com/embed/${videoId}`;
}
})
.catch(err=>console.log(err));

// Episodes
let html='<div class="episode-grid">';
seriesData[show].episodes.forEach(ep=>{
html+=`<a href="${ep.link}" class="episode-box">EP ${ep.number}</a>`;
});
html+='</div>';

document.getElementById("episodeContainer").innerHTML=html;

}else{
document.getElementById("seriesTitle").innerText="Series Not Found";
}
