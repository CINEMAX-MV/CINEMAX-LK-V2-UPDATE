<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>TV Series</title>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(to bottom,#0a0a0a,#111);
color:#fff;
}

/* ===== CONTAINER ===== */
.container{
width:1000px;
margin:40px auto;
background:rgba(20,20,20,0.7);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,60,0,0.15);
}

/* ===== HERO POSTER ===== */
.hero{
height:520px;
border-radius:25px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
box-shadow:0 0 50px rgba(255,60,0,0.3);
margin-bottom:40px;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.9),rgba(0,0,0,0.3));
}

.hero-overlay{
position:absolute;
bottom:40px;
left:40px;
z-index:2;
}

.hero-overlay h1{
font-size:42px;
color:#ff7b00;
text-shadow:0 0 25px rgba(255,123,0,0.6);
margin:0;
}

/* ===== EPISODES ===== */
.episode-list{
margin-top:20px;
}

.episode-item{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(145deg,#141414,#1c1c1c);
padding:20px 25px;
margin-bottom:18px;
border-radius:16px;
text-decoration:none;
color:#fff;
border:1px solid #222;
transition:all 0.35s ease;
position:relative;
overflow:hidden;
}

.episode-item::before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:6px;
background:#ff3c00;
transition:0.3s;
}

.episode-item:hover{
transform:translateX(10px) scale(1.03);
box-shadow:0 15px 40px rgba(255,60,0,0.45);
border:1px solid #ff3c00;
}

.episode-item:hover::before{
width:10px;
}

.ep-left{
display:flex;
flex-direction:column;
}

.ep-title{
font-size:18px;
font-weight:600;
}

.ep-meta{
font-size:13px;
color:#aaa;
margin-top:5px;
}

.ep-right{
display:flex;
align-items:center;
gap:10px;
}

.badge{
background:#000;
padding:5px 12px;
border-radius:20px;
font-size:12px;
border:1px solid #333;
}

.watch-btn{
background:#000;
padding:7px 18px;
border-radius:30px;
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
border:1px solid #333;
transition:0.3s;
}

.episode-item:hover .watch-btn{
background:#fff;
color:#000;
font-weight:bold;
}

/* ===== ANNOUNCEMENT ===== */
.announcement{
margin-top:70px;
background:linear-gradient(145deg,#111,#1a1a1a);
padding:30px;
border-left:6px solid red;
border-radius:15px;
color:#ffcc00;
line-height:1.8;
box-shadow:0 0 25px rgba(255,0,0,0.2);
}

.announcement h3{
color:#ff3c00;
margin-top:0;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.container{width:95%;}
.hero{height:300px;}
}

</style>
</head>

<body>
