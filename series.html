<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(to bottom,#0a0a0a,#111);
color:#fff;
}

.container{
width:1000px;
margin:40px auto;
background:rgba(20,20,20,0.7);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,60,0,0.15);
}

/* HERO */
.hero{
height:520px;
border-radius:25px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
box-shadow:0 0 50px rgba(255,60,0,0.3);
margin-bottom:40px;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.9),rgba(0,0,0,0.3));
}

.hero-overlay{
position:absolute;
bottom:40px;
left:40px;
z-index:2;
}

.hero-overlay h1{
font-size:42px;
color:#ff7b00;
text-shadow:0 0 25px rgba(255,123,0,0.6);
margin:0;
}

/* EPISODES */
.episode-item{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(145deg,#141414,#1c1c1c);
padding:20px 25px;
margin-bottom:18px;
border-radius:16px;
text-decoration:none;
color:#fff;
border:1px solid #222;
transition:0.35s;
}

.episode-item:hover{
transform:translateX(10px);
box-shadow:0 15px 40px rgba(255,60,0,0.45);
border:1px solid #ff3c00;
}

.ep-meta{
font-size:13px;
color:#aaa;
}

.badge{
background:#000;
padding:5px 12px;
border-radius:20px;
font-size:12px;
border:1px solid #333;
}

.watch-btn{
background:#000;
padding:7px 18px;
border-radius:30px;
font-size:12px;
text-transform:uppercase;
border:1px solid #333;
}

.episode-item:hover .watch-btn{
background:#fff;
color:#000;
font-weight:bold;
}

/* ANNOUNCEMENT */
.announcement{
margin-top:60px;
background:#111;
padding:25px;
border-left:6px solid red;
border-radius:15px;
color:#ffcc00;
}

@media(max-width:768px){
.container{width:95%;}
.hero{height:300px;}
}

</style>
