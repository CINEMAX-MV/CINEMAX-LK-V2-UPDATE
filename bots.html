<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Movie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
padding:30px;
}

/* container */

.container{
max-width:700px;
margin:auto;
text-align:center;
}

/* poster */

.poster{
width:100%;
max-width:320px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
margin-bottom:20px;
}

/* title */

.title{
font-size:28px;
font-weight:600;
margin-bottom:10px;
background:linear-gradient(90deg,#ff8c00,#ff2a68);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* description */

.desc{
font-size:15px;
color:#ccc;
line-height:1.7;
margin-bottom:20px;
}

/* details */

.details{
background:rgba(255,255,255,0.05);
padding:18px;
border-radius:12px;
margin-bottom:25px;
line-height:1.8;
}

/* bot buttons */

.bot{

display:flex;
align-items:center;
justify-content:center;

gap:12px;

margin:12px 0;
padding:16px;

border-radius:14px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.08);

text-decoration:none;
color:white;
font-size:17px;

transition:0.3s;
}

.bot:hover{

background:#25D366;
transform:translateY(-3px);

box-shadow:0 8px 25px rgba(37,211,102,0.5);

}

.bot img{
width:22px;
}

.sub{
font-size:13px;
opacity:0.6;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<img id="poster" class="poster">

<div id="movietitle" class="title"></div>

<div id="desc" class="desc"></div>

<div class="details">
<p>📅 <b>Release Date:</b> <span id="release"></span></p>
<p>🎬 <b>Director:</b> <span id="director"></span></p>
<p>⏳ <b>Runtime:</b> <span id="runtime"></span></p>
<p>🎭 <b>Genre:</b> <span id="genre"></span></p>
</div>

<div class="sub">Select WhatsApp Bot To Download</div>

<a id="bot1" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 1
</a>

<a id="bot2" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 2
</a>

<a id="bot3" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 3
</a>

</div>

<script>

// URL parameters
let params = new URLSearchParams(window.location.search);

let movieTitle = decodeURIComponent(params.get("title") || "");
let cmd = params.get("cmd");
let link = params.get("link");

// fetch movies.json
fetch("/data/movies.json")
.then(res => res.json())
.then(data => {

let movie = data.find(m => 
m.title.toLowerCase() === movieTitle.toLowerCase()
);

if(!movie){
console.log("Movie not found:", movieTitle);
return;
}

// show movie details

document.getElementById("poster").src = movie.image;
document.getElementById("movietitle").textContent = movie.title;
document.getElementById("desc").textContent = movie.description;

document.getElementById("release").textContent = movie.release_date;
document.getElementById("director").textContent = movie.director;
document.getElementById("runtime").textContent = movie.runtime;
document.getElementById("genre").textContent = movie.genre;

});

// whatsapp command

let message = encodeURIComponent(cmd + link);

document.getElementById("bot1").href =
"https://wa.me/94740571366?text=" + message;

document.getElementById("bot2").href =
"https://wa.me/94774397157?text=" + message;

document.getElementById("bot3").href =
"https://wa.me/94772461954?text=" + message;

</script>

</body>
</html>
