<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select WhatsApp Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* container */

.container{
text-align:center;
width:90%;
max-width:400px;
}

/* title */

h2{
margin-bottom:35px;
font-weight:500;
letter-spacing:1px;
}

/* bot button */

.bot{

display:flex;
align-items:center;
justify-content:center;

gap:12px;

margin:15px 0;
padding:18px;

border-radius:14px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.08);

text-decoration:none;
color:white;
font-size:18px;

transition:0.3s;
}

/* hover */

.bot:hover{

background:#25D366;
transform:translateY(-4px) scale(1.02);

box-shadow:0 8px 25px rgba(37,211,102,0.5);

}

/* icon */

.bot img{
width:22px;
}

/* subtitle */

.sub{
font-size:13px;
opacity:0.6;
margin-top:-20px;
margin-bottom:25px;
}

</style>
</head>

<body>

<div class="container">

<h2>Choose WhatsApp Bot</h2>

<div class="sub">Select a bot to download the movie</div>

<a id="bot1" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 1
</a>

<a id="bot2" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 2
</a>

<a id="bot3" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 3
</a>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let cmd = params.get("cmd");
let link = params.get("link");

let message = encodeURIComponent(cmd + link);

document.getElementById("bot1").href =
"https://wa.me/94740571366?text=" + message;

document.getElementById("bot2").href =
"https://wa.me/94774397157?text=" + message;

document.getElementById("bot3").href =
"https://wa.me/94772461954?text=" + message;

</script>

</body>
</html>
