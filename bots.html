<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select WhatsApp Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* container */
.container{
  text-align:center;
  width:90%;
  max-width:400px;
  padding:20px;
}

/* movie poster */
.poster{
  width:100%;
  max-width:250px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  margin:0 auto 20px auto;
  transition: transform 0.3s;
}

.poster:hover{
  transform:scale(1.05);
}

/* movie title */
.title{
  font-size:22px;
  font-weight:600;
  margin-bottom:20px;
  text-shadow:0 2px 10px rgba(0,0,0,0.5);
}

/* subtitle */
.sub{
  font-size:14px;
  opacity:0.7;
  margin-bottom:25px;
}

/* bot button */
.bot{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:15px 0;
  padding:16px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  text-decoration:none;
  color:white;
  font-size:18px;
  font-weight:500;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

/* button hover animation */
.bot::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, rgba(37,211,102,0.4), rgba(37,211,102,0));
  transition:0.5s;
}

.bot:hover::before{
  left:100%;
}

.bot:hover{
  background:#25D366;
  transform:translateY(-4px) scale(1.02);
  box-shadow:0 8px 25px rgba(37,211,102,0.5);
}

.bot img{
  width:22px;
}

/* responsive */
@media(max-width:420px){
  .title{ font-size:20px; }
  .bot{ font-size:16px; padding:14px; }
}

</style>
</head>

<body>

<div class="container">

<img id="poster" class="poster" src="" alt="Movie Poster">

<div class="title" id="movietitle"></div>

<div class="sub">Select a bot to download the movie</div>

<a id="bot1" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 1
</a>

<a id="bot2" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 2
</a>

<a id="bot3" class="bot">
<img src="https://img.icons8.com/color/48/whatsapp.png">
Use Bot 3
</a>

</div>

<script>
// get params
let params = new URLSearchParams(window.location.search);

let cmd = params.get("cmd");
let link = params.get("link");
let poster = params.get("poster"); // new
let title = params.get("title");   // new

// set poster & title
document.getElementById("poster").src = poster || "https://via.placeholder.com/250x360?text=No+Poster";
document.getElementById("movietitle").textContent = title || "Movie Title";

// set whatsapp links
let message = encodeURIComponent(cmd + link);

document.getElementById("bot1").href =
"https://wa.me/94740571366?text=" + message;

document.getElementById("bot2").href =
"https://wa.me/94774397157?text=" + message;

document.getElementById("bot3").href =
"https://wa.me/94772461954?text=" + message;

</script>

</body>
</html>
