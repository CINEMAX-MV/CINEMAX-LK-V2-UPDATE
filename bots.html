<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Details & Download</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{
  margin:0; padding:0; box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  line-height:1.6;
  padding:30px;
}

.container{
  max-width:1000px;
  margin:0 auto;
}

.poster{
  width:100%;
  max-width:500px;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  margin:0 auto 25px auto;
  transition:transform 0.3s;
}
.poster:hover{
  transform:scale(1.03);
}

.title{
  font-size:2.8em;
  font-weight:700;
  text-align:center;
  background:linear-gradient(90deg,#ff8c00,#ff2a68);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:15px;
}

.description{
  font-size:1.15em;
  color:#ddd;
  text-align:center;
  max-width:800px;
  margin:0 auto 35px auto;
}

.details{
  display:flex;
  gap:35px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.details-left{
  flex:1;
  min-width:250px;
}

.details-left img{
  width:100%;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  margin-bottom:15px;
}

.imdb{
  font-size:1.2em;
}

.imdb span{
  margin-right:8px;
}

.details-right{
  flex:2;
  min-width:300px;
  line-height:1.8;
  font-size:1.05em;
}

.bot-container{
  text-align:center;
  margin-top:20px;
}

.bot{
  display:inline-flex;
  align-items:center;
  gap:12px;
  margin:15px;
  padding:16px 30px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  font-size:18px;
  font-weight:500;
  text-decoration:none;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}

.bot img{
  width:22px;
}

.bot::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, rgba(37,211,102,0.4), rgba(37,211,102,0));
  transition:0.5s;
}

.bot:hover::before{
  left:100%;
}

.bot:hover{
  background:#25D366;
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 10px 30px rgba(37,211,102,0.5);
}

@media(max-width:900px){
  .details{
    flex-direction:column;
    align-items:center;
  }
  .details-right, .details-left{
    min-width:100%;
  }
}
</style>
</head>
<body>

<div class="container">

  <!-- BIG POSTER -->
  <img id="bigposter" class="poster" src="" alt="Movie Poster">

  <!-- TITLE & DESCRIPTION -->
  <div class="title" id="movietitle"></div>
  <div class="description" id="moviedesc"></div>

  <!-- DETAILS CARD -->
  <div class="details">
    <div class="details-left">
      <img id="smallposter" src="" alt="Poster">
      <div class="imdb">
        <strong>IMDb:</strong> <span id="stars"></span> <span id="imdbscore"></span>
      </div>
    </div>
    <div class="details-right">
      <p>📅 <strong>Release Date:</strong> <span id="release"></span></p>
      <p>🎬 <strong>Director:</strong> <span id="director"></span></p>
      <p>⏳ <strong>Runtime:</strong> <span id="runtime"></span></p>
      <p>🎭 <strong>Genre:</strong> <span id="genre"></span></p>
    </div>
  </div>

  <!-- WHATSAPP BOTS -->
  <div class="bot-container">
    <a id="bot1" class="bot"><img src="https://img.icons8.com/color/48/whatsapp.png">Use Bot 1</a>
    <a id="bot2" class="bot"><img src="https://img.icons8.com/color/48/whatsapp.png">Use Bot 2</a>
    <a id="bot3" class="bot"><img src="https://img.icons8.com/color/48/whatsapp.png">Use Bot 3</a>
  </div>

</div>

<script>
// Sample movie object (replace with dynamic fetch)
const movie = {
  title: "Avengers: Endgame",
  description: "After the devastating events of Infinity War, the Avengers assemble once more to reverse Thanos' actions.",
  image: "https://upload.wikimedia.org/wikipedia/en/0/0d/Avengers_Endgame_poster.jpg",
  imdb: 8.4,
  release_date: "26 April 2019",
  director: "Anthony & Joe Russo",
  runtime: "3h 1m",
  genre: "Action, Adventure, Sci-Fi"
};

// Function to show stars
function getStars(score){
  let full = Math.floor(score);
  let half = score - full >= 0.5 ? 1 : 0;
  let empty = 10 - full - half;
  return '★'.repeat(full)+'☆'.repeat(half)+'✩'.repeat(empty);
}

// Fill movie data
document.getElementById("bigposter").src = movie.image;
document.getElementById("smallposter").src = movie.image;
document.getElementById("movietitle").textContent = movie.title;
document.getElementById("moviedesc").textContent = movie.description;
document.getElementById("stars").textContent = getStars(movie.imdb);
document.getElementById("imdbscore").textContent = `(${movie.imdb}/10)`;
document.getElementById("release").textContent = movie.release_date;
document.getElementById("director").textContent = movie.director;
document.getElementById("runtime").textContent = movie.runtime;
document.getElementById("genre").textContent = movie.genre;

// WhatsApp download setup
let command = ".download "; // default (change dynamically based on link)
let movieLink = "https://example.com/movie.mp4"; // replace with real link
let message = encodeURIComponent(command + movieLink);

document.getElementById("bot1").href = "https://wa.me/94740571366?text=" + message;
document.getElementById("bot2").href = "https://wa.me/94774397157?text=" + message;
document.getElementById("bot3").href = "https://wa.me/94772461954?text=" + message;

</script>

</body>
</html>
