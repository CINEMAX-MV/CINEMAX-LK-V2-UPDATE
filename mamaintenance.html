<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinemax Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0f1a;
color:white;
overflow:hidden;
}

/* Animated Gradient Background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(
45deg,
#0f172a,
#020617,
#1e293b,
#020617
);
animation:bgmove 20s linear infinite;
z-index:-1;
}

@keyframes bgmove{
0%{transform:translate(-20%,-20%)}
50%{transform:translate(-10%,-30%)}
100%{transform:translate(-20%,-20%)}
}

/* Main Card */

.box{

width:90%;
max-width:650px;

padding:60px 45px;

text-align:center;

background:rgba(255,255,255,0.05);
border-radius:25px;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 30px 120px rgba(0,0,0,0.8),
0 0 40px rgba(0,255,150,0.08);

animation:fade 1.2s ease;
}

/* Icon */

.icon{

font-size:70px;
margin-bottom:20px;
animation:spin 6s linear infinite;

}

@keyframes spin{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

/* Title */

h1{
font-size:36px;
margin-bottom:10px;
letter-spacing:1px;
}

/* Text */

p{

font-size:18px;
opacity:0.8;
line-height:1.7;
margin-bottom:35px;

}

/* Countdown */

.countdown{

display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;

}

.time{

background:rgba(255,255,255,0.06);
padding:18px 22px;
border-radius:15px;
min-width:70px;

box-shadow:0 0 20px rgba(0,255,120,0.1);

}

.time h2{

font-size:28px;

}

.time span{

font-size:13px;
opacity:0.7;

}

/* Button */

.btn{

display:inline-block;

padding:14px 30px;

background:linear-gradient(45deg,#22c55e,#16a34a);

border-radius:12px;

text-decoration:none;
color:white;
font-weight:600;

transition:0.3s;

}

.btn:hover{

transform:scale(1.08);
box-shadow:0 0 25px #22c55e;

}

/* Footer */

footer{

margin-top:35px;

font-size:14px;

opacity:0.6;

}

/* Fade Animation */

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Mobile */

@media(max-width:600px){

h1{
font-size:28px;
}

p{
font-size:15px;
}

.icon{
font-size:55px;
}

.time h2{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="box">

<div class="icon">⚙️</div>

<h1>Site Under Maintenance</h1>

<p>
Cinemax website is currently undergoing maintenance.<br>
We are upgrading the system to give you a better experience.
</p>

<div class="countdown">

<div class="time">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>

<div class="time">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>

<div class="time">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>

</div>

<a href="" class="btn">Refresh Page</a>

<footer>
© 2026 Cinemax Movie
</footer>

</div>

<script>

/* Countdown 3 hours example */

let time = 3 * 60 * 60;

function updateCountdown(){

let hours = Math.floor(time / 3600);
let minutes = Math.floor((time % 3600) / 60);
let seconds = time % 60;

document.getElementById("hours").innerText = hours.toString().padStart(2,"0");
document.getElementById("minutes").innerText = minutes.toString().padStart(2,"0");
document.getElementById("seconds").innerText = seconds.toString().padStart(2,"0");

if(time > 0){
time--;
}

}

setInterval(updateCountdown,1000);

</script>

</body>
</html>
