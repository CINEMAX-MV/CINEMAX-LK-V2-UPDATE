<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episode</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:500px;
margin:60px auto;
background:#1a1a1a;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(255,60,0,0.2);
}

img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

h2{
margin-bottom:10px;
color:#ff7b00;
}

.meta{
color:#aaa;
margin-bottom:20px;
}

.btn{
display:block;
padding:14px;
margin:15px 0;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.whatsapp{
background:#25D366;
color:white;
}

.online{
background:#e50914;
color:white;
}

.btn:hover{
opacity:0.8;
}

.back{
margin-top:20px;
display:block;
color:#aaa;
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

<img id="poster">

<h2 id="title"></h2>

<div id="meta" class="meta"></div>

<a id="onlineBtn" class="btn online" target="_blank">
🌐 Download via Online
</a>

<a id="whatsappBtn" class="btn whatsapp" target="_blank">
📥 Download via WhatsApp
</a>

<a href="javascript:history.back()" class="back">
⬅ Back
</a>

</div>

<script src="series-data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const show = params.get("show")?.toLowerCase();
const epNumber = parseInt(params.get("ep"));

if(seriesData[show]){

const data = seriesData[show];
const episode = data.episodes.find(e => e.number === epNumber);

if(!episode){
document.getElementById("title").innerText = "Episode Not Found";
}else{

// Title
document.getElementById("title").innerText =
data.title + " - Episode " + episode.number;

// Poster
document.getElementById("poster").src = data.poster;

// Meta
document.getElementById("meta").innerText =
(episode.quality || "") +
(episode.size ? " • " + episode.size : "") +
(episode.duration ? " • " + episode.duration : "");

// Online button
document.getElementById("onlineBtn").href = episode.link;

// WhatsApp button
const whatsappNumber = "94772461954";
const message = `.download ${episode.link}`;
const whatsappURL =
`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

document.getElementById("whatsappBtn").href = whatsappURL;

}

}else{
document.getElementById("title").innerText = "Series Not Found";
}

</script>

</body>
</html>
