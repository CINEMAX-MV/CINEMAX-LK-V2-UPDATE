<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Episode Download</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:linear-gradient(to bottom,#0a0a0a,#111);
color:white;
}

.container{
width:600px;
margin:80px auto;
background:#141414;
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,60,0,0.25);
text-align:center;
}

img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

h2{
color:#ff7b00;
}

.btn{
display:block;
padding:15px;
margin:15px 0;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.online{
background:#e50914;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

.btn:hover{
opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

<img id="poster">

<h2 id="title"></h2>

<a id="onlineBtn" class="btn online" target="_blank">
Download via Online
</a>

<a id="whatsappBtn" class="btn whatsapp" target="_blank">
Download via WhatsApp
</a>

</div>

<script>

const episode = JSON.parse(localStorage.getItem("selectedEpisode"));

if(!episode){

document.body.innerHTML =
"<h2 style='color:white;text-align:center;margin-top:100px;'>Episode Not Found</h2>";

}else{

document.getElementById("title").innerText =
episode.title + " - Episode " + episode.number;

document.getElementById("poster").src = episode.poster;

document.getElementById("onlineBtn").href = episode.link;

document.getElementById("whatsappBtn").href =
`https://wa.me/94772461954?text=${encodeURIComponent(".download "+episode.link)}`;

}

</script>

</body>
</html>
