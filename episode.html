<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Episode Download</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:linear-gradient(to bottom,#0a0a0a,#111);
color:white;
}

.container{
width:600px;
margin:80px auto;
background:#141414;
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,60,0,0.25);
text-align:center;
}

img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

h2{
color:#ff7b00;
}

.meta{
color:#aaa;
margin:15px 0 30px 0;
}

.btn{
display:block;
padding:15px;
margin:15px 0;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.online{
background:#e50914;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

.btn:hover{
opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

<img id="poster">

<h2 id="title"></h2>

<div id="meta" class="meta"></div>

<a id="onlineBtn" class="btn online" target="_blank">
Download via Online
</a>

<a id="whatsappBtn" class="btn whatsapp" target="_blank">
Download via WhatsApp
</a>

</div>

<script>

// ⚠ IMPORTANT: SAME seriesData object paste here too

const seriesData = /* 👉 මෙතන ඔයාගේ seriesData object එක full paste කරන්න */ ;

const params = new URLSearchParams(window.location.search);
const show = params.get("show")?.toLowerCase();
const epNumber = parseInt(params.get("ep"));

if(seriesData[show]){

const data = seriesData[show];
const episode = data.episodes.find(e => e.number === epNumber);

if(episode){

document.getElementById("title").innerText =
data.title + " - Episode " + episode.number;

document.getElementById("poster").src = data.poster;

document.getElementById("meta").innerText =
(episode.duration || "") +
(episode.size ? " • "+episode.size : "") +
(episode.quality ? " • "+episode.quality : "");

// 🔥 ONLINE DOWNLOAD
document.getElementById("onlineBtn").href = episode.link;

// 🔥 WHATSAPP COMMAND
const whatsappNumber = "94772461954";
const message = `.download ${episode.link}`;

document.getElementById("whatsappBtn").href =
`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

}

}

</script>

</body>
</html>
