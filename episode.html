<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episode</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.thumbnail{
width:100%;
border-radius:12px;
margin-bottom:20px;
}

h2{
margin:10px 0;
}

.meta{
color:#aaa;
margin-bottom:20px;
font-size:14px;
}

.btn{
display:block;
text-align:center;
padding:14px;
margin:12px 0;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.whatsapp{
background:#25D366;
color:white;
}

.whatsapp:hover{
background:white;
color:#25D366;
}

.online{
background:#e50914;
color:white;
}

.online:hover{
background:white;
color:#e50914;
}

.back{
margin-top:20px;
display:block;
text-align:center;
color:#aaa;
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

<img id="thumbnail" class="thumbnail">

<h2 id="title"></h2>

<div id="meta" class="meta"></div>

<a id="whatsappBtn" class="btn whatsapp" target="_blank">
📥 Download via WhatsApp
</a>

<a id="onlineBtn" class="btn online" target="_blank">
🌐 Download via Online
</a>

<a href="javascript:history.back()" class="back">
⬅ Back to Episodes
</a>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const seriesId = urlParams.get("series");
const epNumber = urlParams.get("ep");

fetch("data/series.json")
.then(res=>res.json())
.then(data=>{

const series = data.find(s=>s.id==seriesId);
if(!series) return;

const episode = series.episodes.find(e=>e.number==epNumber);
if(!episode) return;

// Set Title
document.getElementById("title").innerText =
series.title + " - Episode " + episode.number;

// Thumbnail (use episode image or series image)
document.getElementById("thumbnail").src =
episode.image || series.image;

// Meta Info
document.getElementById("meta").innerText =
(episode.quality || "") + " • " +
(episode.size || "") + " • " +
(episode.duration || "");

// Online Link
document.getElementById("onlineBtn").href = episode.link;

// WhatsApp Link
const whatsappNumber = "94772461954";
const message = `.download ${episode.link}`;
const whatsappURL =
`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

document.getElementById("whatsappBtn").href = whatsappURL;

});

</script>

</body>
</html>
