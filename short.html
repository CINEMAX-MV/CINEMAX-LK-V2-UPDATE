<body>

<script>
// ===============================
// 🔗 SHORT LINK → ORIGINAL LINK MAPPING
// ===============================
// Add all your short codes here
const shortLinks = {
  "t34mke": "https://drive.google.com/uc?export=download&id=FILE_ID_1",

  // add more short codes as needed
};

// ===============================
// ⬇ GET SHORT CODE FROM URL
// ===============================
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

// ===============================
// ⬇ REDIRECT LOGIC
// ===============================
if(code && shortLinks[code]){
  const originalLink = shortLinks[code];
  document.getElementById("status").innerText = "Redirecting to download...";
  
  // small delay to show message
  setTimeout(() => {
    window.location.href = originalLink;
  }, 1500);
} else {
  document.getElementById("status").innerHTML = `
    ⚠️ Invalid or expired link.<br>
    Please go back to CINEMAXLK and try again.

</script>
