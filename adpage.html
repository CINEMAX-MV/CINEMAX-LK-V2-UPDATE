<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please Wait...</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:40px 15px;
}

.box{
max-width:420px;
margin:auto;
background:#1a1a1a;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

h2{
margin-bottom:10px;
}

.ad-box{
margin-top:20px;
position:relative;
}

.ad-box img{
width:100%;
border-radius:10px;
}

.countdown{
position:absolute;
top:10px;
right:10px;
background:black;
padding:6px 12px;
border-radius:20px;
font-size:14px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:red;
color:white;
font-size:16px;
cursor:pointer;
display:none;
}

button:hover{
background:darkred;
}

</style>
</head>

<body>

<div class="box">

<h2>Loading Movie...</h2>

<!-- Poster Ad -->
<div class="ad-box" id="adBox">

<div class="countdown">
<span id="count">5</span>s
</div>

<img src="https://i.ibb.co/Txx73Q0r/file-000000006230720b830d97cba8f861ea.png">

</div>

<!-- Continue Button -->
<button id="continueBtn">Continue</button>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);

// Movie info
const movieId = urlParams.get("id");
const playLink = urlParams.get("play");

const whatsappLink = "https://whatsapp.com/channel/0029VbCQwiiAzNbtleGlQS1r";
const imdbLink = "https://m.imdb.com/";
const movieSite = "movie.html";

// Elements
const countText = document.getElementById("count");
const btn = document.getElementById("continueBtn");
const adBox = document.getElementById("adBox");

let timeLeft = 5;

// Countdown
const timer = setInterval(()=>{

timeLeft--;
countText.innerText = timeLeft;

if(timeLeft <= 0){

clearInterval(timer);

// hide poster
adBox.style.display="none";

// show continue button
btn.style.display="inline-block";

}

},1000);


// Step system
let step = sessionStorage.getItem("adStep") || "1";

function updateButtonText(){

if(step==="1") btn.innerText="Continue to IMDb";

else if(step==="2") btn.innerText="Continue to WhatsApp Channel";

}

updateButtonText();

btn.onclick = () => {

if(step==="1"){

sessionStorage.setItem("adStep","2");
step="2";

updateButtonText();

window.open(imdbLink,"_blank");

}else if(step==="2"){

sessionStorage.setItem("adStep","3");

window.open(whatsappLink,"_blank");

setTimeout(()=>{

window.location.href =
`${movieSite}?id=${movieId}&autoplay=${encodeURIComponent(playLink)}`;

},1000);

}

};


// Focus detect
window.addEventListener("focus",()=>{

if(step==="2"){

btn.style.display="inline-block";

}

});


// Reset after movie start
window.onbeforeunload = () => {

if(step==="3"){

sessionStorage.removeItem("adStep");

}

};

</script>

</body>
</html>
